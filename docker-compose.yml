version: '3.8'

services:
  mysql:
    image: mysql:8.0
    platform: linux/arm64
    container_name: realtime-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: realtime_db
      MYSQL_USER: realtime
      MYSQL_PASSWORD: realtime1234
      TZ: Asia/Seoul
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - realtime-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    platform: linux/arm64
    container_name: realtime-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
      TZ: Asia/Seoul
    volumes:
      - minio_data:/Users/sandeulpark/data
    command: server /data --console-address ":9001"
    networks:
      - realtime-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  mysql_data:
    driver: local
  minio_data:
    driver: local

networks:
  realtime-network:
    driver: bridge