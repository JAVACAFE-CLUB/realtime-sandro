version: '3.8'

services:
  mysql:
    image: mysql:8.0
    platform: linux/arm64
    container_name: realtime-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: realtime_db
      MYSQL_USER: realtime
      MYSQL_PASSWORD: realtime1234
      TZ: Asia/Seoul
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - realtime-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  realtime-network:
    driver: bridge