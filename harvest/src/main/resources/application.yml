server:
  port: 8080

spring:
  application:
    name: harvest

  datasource:
    url: jdbc:mysql://localhost:3306/harvest_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: realtime
    password: realtime1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  batch:
    job:
      enabled: false  # 애플리케이션 시작 시 자동 실행 방지
    jdbc:
      initialize-schema: always  # 수동으로 테이블 생성하므로 비활성화

# Harvest 모듈 설정
harvest:

  # 파일 처리 설정
  file:
    # 대용량 파일이 저장된 외부 경로
    base-path: ~/bigdata
    
    # 처리할 파일 목록
    sources:
      - name: kowiki
        file-name: kowiki-20250820-pages-articles-multistream1.xml
        enabled: true
    
    # 처리 옵션
    chunk-size: 1048576  # 1MB
    encoding: UTF-8