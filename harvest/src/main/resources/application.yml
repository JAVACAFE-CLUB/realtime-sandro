server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

spring:
  application:
    name: harvest
  output:
    ansi:
      enabled: always
  datasource:
    url: jdbc:mysql://localhost:3308/harvest_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: realtime
    password: realtime1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  batch:
    # Spring Batch 메타데이터 테이블 자동 생성
    jdbc:
      initialize-schema: always
    job:
      # 애플리케이션 시작 시 자동으로 Job 실행 여부
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true
  data:
    mongodb:
      host: localhost
      port: 27017
      username: admin
      password: admin1234
      authentication-database: admin
      database: harvest_db
      auto-index-creation: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # 배치 최적화 설정 (위키 대용량 텍스트 데이터에 최적화)
        batch.size: 1048576       # 1MB - 위키 데이터 특성상 큰 배치 사이즈 설정
        linger.ms: 50             # 50ms - 대량 데이터 처리를 위해 대기 시간 증가
        buffer.memory: 134217728  # 128MB - 대용량 데이터 처리를 위해 버퍼 증가
        compression.type: lz4     # 압축 (성능 향상)
        
        # 멱등성 프로듀서 설정 (exactly-once 전송 보장)
        enable.idempotence: true   # 멱등성 프로듀서 활성화
        acks: all                 # 안정성 (모든 replica 확인)
        retries: 2147483647       # 최대 재시도 (멱등성 프로듀서 필수)
        max.in.flight.requests.per.connection: 5  # 연결당 최대 진행 중 요청

harvest:
  description: "대용량 파일 수집 시스템 - 수확기"
  version: 1.0.0

# 배치 관련 설정
batch:
  chunk:
    size: 1000
  wiki:
    file:
      directory: ${user.home}/bigdata
      pattern: kowiki-*-pages-articles-multistream1.xml-*.bz2

# 로깅 설정
logging:
  level:
    com.sandro.realtime.harvest: DEBUG
    org.springframework.batch: INFO
    org.springframework.batch.core.job: DEBUG
    org.springframework.batch.core.step: DEBUG